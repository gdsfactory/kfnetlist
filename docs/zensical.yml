site_name: kfnetlist
repo_url: https://github.com/gdsfactory/kfnetlist
site_url: https://gdsfactory.github.io/kfnetlist
docs_dir: source-built

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting_started/installation.md
      - Quickstart: getting_started/quickstart.md
  - Concepts:
      - Netlist Model: concepts/netlist_model.md
      - Ports & Refs: concepts/ports_and_refs.md
      - Serialization: concepts/serialization.md
  - Extraction:
      - Overview: extraction/overview.md
      - Optical Nets: extraction/optical_nets.md
      - Electrical L2N: extraction/electrical_l2n.md
      - Port Checking: extraction/port_checking.md
  - Guides:
      - LVS Equivalence: guides/lvs_equivalence.md
      - Instance Flattening: guides/instance_flattening.md
      - FAQ: guides/faq.md
  - Reference:
      # The "API" sub-tree is auto-generated and spliced in at build time
      # by docs/scripts/build_docs_source.py — DO NOT enumerate modules
      # here manually. Edit `gen_api_reference` to change the structure.
      - API: reference/   # SPLICE_API
      - Changelog: changelog.md
theme:
  name: "material"
  features:
    - navigation.tabs
    - navigation.tabs.sticky
  custom_dir: overrides

  palette:
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

extra:
  version:
    provider: mike
    default: latest

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tasklist
  - pymdownx.tabbed
  - pymdownx.emoji:
      emoji_index: !!python/name:zensical.extensions.emoji.twemoji
      emoji_generator: !!python/name:zensical.extensions.emoji.to_svg
  - pymdownx.snippets:
      check_paths: true

plugins:
  - mkdocstrings:
      enabled: true
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
            allow_inspection: true
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true
            members_order: alphabetical
            show_submodules: false
            show_root_heading: true
            show_root_full_path: false
  - search
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
